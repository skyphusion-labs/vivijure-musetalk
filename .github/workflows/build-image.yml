name: build-image

# Build + push the vivijure-musetalk CONSUMER image (the thin half of the 2-image split): the default
# Dockerfile is `FROM base-<N>@digest` + `COPY handler.py`, so this build pulls the digest-pinned base
# and re-pushes ONLY the handler layer -- every base layer dedups on GHCR. The expensive base (cu128
# stack + openmmlab build + ~7.3GB weights) is built SEPARATELY + deliberately by base-build.yml
# (dispatch-only); this workflow never rebuilds it.
#
# Runner: GitHub-hosted ubuntu-latest (public repo, fork-safe). The base pull (~17GB) still needs the
# disk-reclaim step below (ubuntu-latest ships ~14GB free), but no weights are re-staged here.
#
# A pushed SemVer tag (v0.1.0) publishes the immutable :0.1.0 release image a RunPod endpoint pins to
# (never :sha, never :latest). A push to main touching the consumer inputs builds a :sha smoke;
# workflow_dispatch rebuilds any ref.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - .github/workflows/build-image.yml
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-musetalk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (the digest-pinned base pull needs more than the ~14GB hosted default)
        run: |
          set -eu
          echo "--- before ---"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          echo "--- after ---"; df -h /

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute tags
        id: tags
        run: |
          TAGS="$IMAGE:latest $IMAGE:${GITHUB_SHA}"
          case "${GITHUB_REF}" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/v}"
              TAGS="$TAGS $IMAGE:${VERSION}"
              ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Building tags: $TAGS"

      - name: Build consumer image (FROM the digest-pinned base + COPY handler)
        run: |
          ARGS=""
          for t in ${{ steps.tags.outputs.tags }}; do ARGS="$ARGS -t $t"; done
          docker build $ARGS .

      - name: Push image
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker push "$t"; done

      - name: Remove local image to free runner disk
        if: always()
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker image rm "$t" || true; done
