name: build-image

# Build + push the vivijure-musetalk CONSUMER image (the thin half of the 2-image split): the default
# Dockerfile is `FROM base-<N>@digest` + `COPY handler.py`, so this build pulls the digest-pinned base
# and re-pushes ONLY the handler layer -- every base layer dedups on GHCR. The expensive base (cu128
# stack + openmmlab build + ~7.3GB weights) is built SEPARATELY + deliberately by base-build.yml
# (dispatch-only); this workflow never rebuilds it.
#
# Runner: GitHub-hosted ubuntu-latest (public repo, fork-safe). The base pull (~17GB) still needs the
# disk-reclaim step below (ubuntu-latest ships ~14GB free), but no weights are re-staged here.
#
# A pushed SemVer tag (v0.1.0) publishes the immutable :0.1.0 release image a RunPod endpoint pins to
# (never :latest, never a full-sha tag -- matches vivijure-upscale / vivijure-audio-upscale doctrine;
# see #47). Trace tag is :sha-<short>. A push to main touching the consumer inputs BUILDS the image
# as a smoke but does NOT push it; only a pushed version tag (or a manual workflow_dispatch) publishes
# to GHCR. A bare merge to main never publishes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - .github/workflows/build-image.yml
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-musetalk
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Assert commit is on main (no publish of an unreviewed release)
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::commit $GITHUB_SHA is not on origin/main; refusing to publish an unreviewed release"
            exit 1
          fi

      - name: Free disk space (hosted runners only; Plane C has TB-class disk)
        if: runner.environment == 'github-hosted'
        run: |
          set -eu
          echo "--- before ---"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune -af || true
          echo "--- after ---"; df -h /

      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute tags
        id: tags
        run: |
          # Pinnable-only: :X.Y.Z on a release tag, plus a short :sha-<short> trace.
          # No :latest (nothing pins it; siblings forbid it). No full-sha tags (#47).
          SHORT="sha-${GITHUB_SHA::7}"
          case "${GITHUB_REF}" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/v}"
              TAGS="$IMAGE:${VERSION} $IMAGE:${SHORT}"
              ;;
            *)
              TAGS="$IMAGE:${SHORT}"
              ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Building tags: $TAGS"

      - name: Build consumer image (FROM the digest-pinned base + COPY handler)
        run: |
          ARGS=""
          for t in ${{ steps.tags.outputs.tags }}; do ARGS="$ARGS -t $t"; done
          docker build $ARGS .

      - name: Push image
        # Publish ONLY on a version tag or a deliberate workflow_dispatch; a bare
        # merge to main builds the image above as a smoke but never pushes it.
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker push "$t"; done

      - name: Remove local image to free runner disk
        if: always()
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker image rm "$t" || true; done
