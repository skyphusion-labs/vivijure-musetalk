name: CodeQL

# Supplies the `CodeQL` status check context required by the org `aviation-grade-main-org` ruleset,
# and the code-scanning alerts that ruleset gates on (high_or_higher / errors).
#
# This repo previously relied on code-scanning DEFAULT SETUP. Default setup often produced no
# PR-triggered CodeQL check at all on workflow/docs-only PRs, leaving merges permanently BLOCKED
# on a required context nothing reported. Committing the workflow makes the scan a reviewable
# artifact and matches vivijure-cf / vivijure-control-plane / vivijure-local.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-vivijure-musetalk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Languages previously covered by default setup on this repo, declared explicitly:
        #   python  -- MuseTalk / RunPod handler Python
        #   actions -- workflows that carry GHCR publish credentials
        language: ["python", "actions"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `languages`, PLURAL. `language` is silently IGNORED (logged only as an "Unexpected input"
      # warning) and the action falls back to auto-detection.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
