name: build-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - download_weights.sh
      - requirements.txt
      - .github/workflows/build-image.yml
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, fleet]
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-musetalk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free dangling images + log in to GHCR
        run: |
          docker image prune -f || true
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute tags
        id: tags
        run: |
          TAGS="$IMAGE:latest $IMAGE:${GITHUB_SHA}"
          # A pushed semver tag (refs/tags/v0.1.0) also publishes the bare release tag :0.1.0 --
          # the immutable versioned image the RunPod endpoint pins to (never :sha, never :latest).
          case "${GITHUB_REF}" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/v}"
              TAGS="$TAGS $IMAGE:${VERSION}"
              ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Building tags: $TAGS"

      - name: Build image
        run: |
          ARGS=""
          for t in ${{ steps.tags.outputs.tags }}; do ARGS="$ARGS -t $t"; done
          docker build $ARGS .

      - name: Push image
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker push "$t"; done

      - name: Remove local image to free runner disk
        if: always()
        run: |
          for t in ${{ steps.tags.outputs.tags }}; do docker image rm "$t" || true; done
