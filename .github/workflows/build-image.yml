name: build-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - handler.py
      - download_weights.sh
      - requirements.txt
      - .github/workflows/build-image.yml

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, fleet]
    timeout-minutes: 240
    env:
      IMAGE: ghcr.io/skyphusion-labs/vivijure-musetalk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free dangling images + log in to GHCR
        run: |
          docker image prune -f || true
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA}" .

      - name: Push image
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"

      - name: Remove local image to free runner disk
        if: always()
        run: docker image rm "$IMAGE:latest" "$IMAGE:${GITHUB_SHA}" || true
